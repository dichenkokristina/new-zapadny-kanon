<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>«Западный канон» — Гарольд Блум</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=PT+Serif:ital,wght@0,400;0,700;1,400&family=Golos+Text:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #F7F5F0;
    --paper: #FFFFFF;
    --paper-line: #E9E3D8;
    --ink: #322E29;
    --ink-soft: #7B7168;
    --ink-faint: #A79E93;

    --a-accent: #8FA687;
    --a-tint: #EEF2E9;
    --b-accent: #B08FA6;
    --b-tint: #F4EDF2;
    --c-accent: #7E9AB3;
    --c-tint: #EAF0F4;
    --d-accent: #C98D80;
    --d-tint: #F7ECE8;

    --heart: #C4746A;
    --radius-lg: 20px;
    --radius-md: 14px;
    --radius-sm: 9px;

    --font-display: 'PT Serif', Georgia, serif;
    --font-body: 'Golos Text', 'Segoe UI', sans-serif;
  }

  *{ box-sizing: border-box; }
  html{ scroll-behavior: smooth; }
  body{
    margin:0;
    background: var(--bg);
    color: var(--ink);
    font-family: var(--font-body);
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
  }

  .wrap{
    max-width: 880px;
    margin: 0 auto;
    padding: 56px 24px 120px;
  }

  header.site{ text-align: center; margin-bottom: 40px; }
  .eyebrow{
    font-family: var(--font-body);
    font-size: 12.5px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--ink-faint);
    margin: 0 0 14px;
  }
  h1.site-title{
    font-family: var(--font-display);
    font-weight: 700;
    font-size: clamp(32px, 5vw, 48px);
    margin: 0 0 8px;
    letter-spacing: -0.01em;
  }
  h1.site-title em{ font-style: italic; font-weight: 400; }
  .site-author{
    font-family: var(--font-display);
    font-style: italic;
    font-size: 19px;
    color: var(--ink-soft);
    margin: 0;
  }

  .toolbar{
    display:flex;
    flex-wrap: wrap;
    align-items:center;
    justify-content:space-between;
    gap: 16px;
    margin: 36px 0 40px;
    padding: 18px 22px;
    background: var(--paper);
    border: 1px solid var(--paper-line);
    border-radius: var(--radius-md);
  }
  .stats{ display:flex; gap: 22px; flex-wrap: wrap; }
  .stat{ display:flex; flex-direction:column; gap:2px; }
  .stat .num{ font-family: var(--font-display); font-size: 21px; font-weight: 700; line-height:1; }
  .stat .label{ font-size: 11.5px; color: var(--ink-faint); letter-spacing:0.04em; }
  .progress-track{
    width: 100%; height: 5px; border-radius: 3px;
    background: var(--paper-line); margin-top: 10px; overflow:hidden;
  }
  .progress-fill{
    height:100%;
    background: linear-gradient(90deg, var(--a-accent), var(--d-accent));
    width:0%; transition: width .4s ease;
  }
  .filters{ display:flex; gap:8px; }
  .filter-btn{
    font-family: var(--font-body);
    font-size: 13px; font-weight: 500;
    padding: 8px 14px; border-radius: 999px;
    border: 1px solid var(--paper-line);
    background: var(--bg); color: var(--ink-soft);
    cursor:pointer; transition: all .15s ease;
  }
  .filter-btn:hover{ border-color: var(--ink-faint); }
  .filter-btn.active{ background: var(--ink); border-color: var(--ink); color: #fff; }

  .epoch{
    position: relative;
    margin-bottom: 18px;
    border-radius: var(--radius-lg);
    border: 1px solid var(--paper-line);
    background: var(--paper);
    overflow: hidden;
  }
  .epoch[data-letter-block="0"]{ --block-accent: var(--a-accent); --block-tint: var(--a-tint); }
  .epoch[data-letter-block="1"]{ --block-accent: var(--b-accent); --block-tint: var(--b-tint); }
  .epoch[data-letter-block="2"]{ --block-accent: var(--c-accent); --block-tint: var(--c-tint); }
  .epoch[data-letter-block="3"]{ --block-accent: var(--d-accent); --block-tint: var(--d-tint); }

  .epoch > summary.epoch-head{
    list-style:none; cursor:pointer;
    display:flex; align-items:center; gap:20px;
    padding: 22px 26px;
    background: var(--block-tint);
    position:relative;
  }
  .epoch > summary::-webkit-details-marker{ display:none; }

  .epoch-letter{
    font-family: var(--font-display);
    font-weight:700; font-size: 46px;
    color: var(--block-accent);
    opacity: 0.55; line-height:1;
    min-width: 46px; text-align:center;
    user-select:none;
  }
  .epoch-heading{ flex:1; min-width:0; }
  .epoch-title{ font-family: var(--font-display); font-weight:700; font-size: 21px; margin:0 0 2px; }
  .epoch-meta{ font-size: 12.5px; color: var(--ink-soft); }
  .epoch-chevron{
    width: 22px; height: 22px; flex-shrink:0;
    color: var(--block-accent);
    transition: transform .25s ease;
  }
  .epoch[open] > summary .epoch-chevron{ transform: rotate(180deg); }

  .epoch-body{ padding: 20px 26px 28px; }
  .epoch-desc{
    font-size: 14.5px; color: var(--ink-soft);
    line-height:1.65; margin: 0 0 22px; max-width: 70ch;
  }
  .epoch-desc p{ margin: 0 0 10px; }
  .epoch-desc p:last-child{ margin-bottom:0; }

  .country{
    border: 1px solid var(--paper-line);
    border-radius: var(--radius-md);
    margin-bottom: 10px; overflow:hidden;
    background: var(--bg);
  }
  .country > summary.country-head{
    list-style:none; cursor:pointer;
    display:flex; align-items:center; justify-content:space-between; gap:12px;
    padding: 13px 18px;
    font-family: var(--font-body); font-weight:600; font-size: 13.5px;
    letter-spacing: 0.05em; text-transform: uppercase; color: var(--ink);
  }
  .country > summary::-webkit-details-marker{ display:none; }
  .country-head-left{ display:flex; align-items:center; gap:10px; }
  .country-dot{ width:7px; height:7px; border-radius:50%; background: var(--block-accent); flex-shrink:0; }
  .country-count{
    font-family: var(--font-body); font-weight:400; text-transform:none;
    letter-spacing:0; font-size: 12px; color: var(--ink-faint);
  }
  .country-chevron{
    width:16px; height:16px; color: var(--ink-faint);
    transition: transform .2s ease; flex-shrink:0;
  }
  .country[open] > summary .country-chevron{ transform: rotate(180deg); }
  .country-body{ padding: 6px 16px 14px; }
  .book-list{ display:flex; flex-direction:column; }

  .author{ margin: 6px 0; border-left: 2px solid var(--paper-line); padding-left: 14px; }
  .author > summary.author-head{
    list-style:none; cursor:pointer;
    display:flex; align-items:center; gap:8px;
    padding: 7px 4px;
    font-family: var(--font-display); font-style: italic; font-size: 15.5px; color: var(--ink);
  }
  .author > summary::-webkit-details-marker{ display:none; }
  .author-chevron{
    width:13px; height:13px; color: var(--ink-faint);
    transition: transform .2s ease; flex-shrink:0;
  }
  .author[open] > summary .author-chevron{ transform: rotate(90deg); }
  .author-count{ font-family: var(--font-body); font-style:normal; font-size: 11.5px; color: var(--ink-faint); }
  .author-body{ padding: 2px 0 4px 4px; }

  .book-row{
    display:flex; align-items:center; gap:12px;
    padding: 7px 4px; border-radius: var(--radius-sm);
    transition: background .12s ease;
  }
  .book-row:hover{ background: var(--paper); }
  .book-row.is-hidden{ display:none; }

  .check{
    flex-shrink:0; width:19px; height:19px; border-radius:50%;
    border: 1.5px solid var(--ink-faint);
    background: transparent; cursor:pointer;
    display:flex; align-items:center; justify-content:center;
    padding:0; transition: all .15s ease;
  }
  .check svg{ width:11px; height:11px; opacity:0; transform: scale(0.6); transition: all .15s ease; stroke: #fff; }
  .book-row.is-read .check{ background: var(--block-accent, var(--ink)); border-color: var(--block-accent, var(--ink)); }
  .book-row.is-read .check svg{ opacity:1; transform: scale(1); }

  .book-title{ flex:1; min-width:0; font-size: 14.5px; cursor:pointer; color: var(--ink); }
  .book-row.is-read .book-title{
    text-decoration: line-through; text-decoration-color: var(--ink-faint); color: var(--ink-faint);
  }

  .heart-btn{
    flex-shrink:0; width:26px; height:26px; border:none; background:transparent;
    cursor:pointer; display:flex; align-items:center; justify-content:center; padding:0;
  }
  .heart-btn svg{ width:16px; height:16px; stroke: var(--ink-faint); fill: none; stroke-width: 1.6; transition: all .15s ease; }
  .heart-btn:hover svg{ stroke: var(--heart); }
  .book-row.is-fav .heart-btn svg{ fill: var(--heart); stroke: var(--heart); }

  .empty-note{ text-align:center; color: var(--ink-faint); font-size: 14px; padding: 60px 20px; display:none; }
  .empty-note.show{ display:block; }

  footer.site{ text-align:center; margin-top: 50px; font-size: 12.5px; color: var(--ink-faint); }

  @media (max-width: 600px){
    .wrap{ padding: 36px 14px 100px; }
    .epoch > summary.epoch-head{ padding:16px; gap:14px; }
    .epoch-letter{ font-size:34px; min-width:34px; }
    .epoch-body{ padding: 14px 14px 20px; }
    .toolbar{ flex-direction:column; align-items:stretch; }
  }

  :focus-visible{ outline: 2px solid var(--c-accent); outline-offset: 2px; }

  /* скрыть описание блока в компактном режиме (Прочитано / Избранное) */
  #epochs.compact .epoch-desc,
  #epochs.compact .epoch-meta{ display:none; }

  /* ---------- User icon (top right) ---------- */
  .user-corner{
    position: fixed;
    top: 22px;
    right: 22px;
    z-index: 40;
  }
  .user-icon-btn{
    width: 40px; height: 40px;
    border-radius: 50%;
    border: 1px solid var(--paper-line);
    background: var(--paper);
    color: var(--ink-soft);
    cursor: pointer;
    display:flex; align-items:center; justify-content:center;
    box-shadow: 0 2px 8px rgba(50,46,41,0.06);
    font-family: var(--font-display);
    font-weight: 700;
    font-size: 15px;
    transition: all .15s ease;
  }
  .user-icon-btn:hover{ border-color: var(--ink-faint); }
  .user-icon-btn svg{ width:19px; height:19px; stroke: var(--ink-soft); fill:none; stroke-width:1.7; }
  .user-icon-btn.is-logged{
    background: var(--ink);
    color: #fff;
  }

  .user-menu{
    position:absolute;
    top: 48px;
    right: 0;
    width: 220px;
    background: var(--paper);
    border: 1px solid var(--paper-line);
    border-radius: var(--radius-md);
    box-shadow: 0 8px 24px rgba(50,46,41,0.1);
    padding: 14px;
    display:none;
  }
  .user-menu.open{ display:block; }
  .user-menu .u-email{
    font-size: 12.5px;
    color: var(--ink-soft);
    word-break: break-all;
    margin: 0 0 10px;
  }
  .user-menu button{
    width:100%;
    padding: 8px;
    border-radius: 999px;
    border: 1px solid var(--paper-line);
    background: var(--bg);
    font-family: var(--font-body);
    font-size: 12.5px;
    color: var(--ink);
    cursor:pointer;
  }
  .user-menu button:hover{ border-color: var(--ink-faint); }

  /* ---------- Auth modal ---------- */
  .modal-backdrop{
    position: fixed;
    inset: 0;
    background: rgba(50,46,41,0.35);
    display:none;
    align-items:center;
    justify-content:center;
    z-index: 100;
    padding: 20px;
  }
  .modal-backdrop.open{ display:flex; }
  .modal-card{
    position:relative;
    width: 100%;
    max-width: 380px;
    background: var(--paper);
    border-radius: var(--radius-lg);
    padding: 32px 28px 28px;
    text-align:center;
  }
  .modal-close{
    position:absolute;
    top: 14px; right: 14px;
    width: 28px; height: 28px;
    border:none; background:transparent;
    color: var(--ink-faint);
    font-size: 18px;
    cursor:pointer;
    line-height:1;
  }
  .modal-close:hover{ color: var(--ink); }
  .modal-card h2{
    font-family: var(--font-display);
    font-size: 21px;
    margin: 4px 0 6px;
  }
  .modal-card p.sub{
    color: var(--ink-soft);
    font-size: 13.5px;
    margin: 0 0 20px;
  }
  .auth-field{ text-align:left; margin-bottom: 12px; }
  .auth-field label{ display:block; font-size: 12px; color: var(--ink-soft); margin-bottom: 5px; }
  .auth-field input{
    width:100%; padding: 10px 12px; border-radius: var(--radius-sm);
    border: 1px solid var(--paper-line); background: var(--bg);
    font-family: var(--font-body); font-size: 14px; color: var(--ink);
  }
  .auth-field input:focus{ outline: 2px solid var(--c-accent); outline-offset: 1px; }
  .auth-submit{
    width:100%; padding: 11px; border-radius: 999px; border:none;
    background: var(--ink); color: #fff;
    font-family: var(--font-body); font-weight: 600; font-size: 14px;
    cursor:pointer; margin-top: 6px; transition: opacity .15s ease;
  }
  .auth-submit:hover{ opacity:0.88; }
  .auth-submit:disabled{ opacity:0.5; cursor:default; }
  .auth-switch{ margin-top: 16px; font-size: 13px; color: var(--ink-soft); }
  .auth-switch button{
    background:none; border:none; color: var(--c-accent);
    font-family: var(--font-body); font-weight:600; font-size: 13px;
    cursor:pointer; text-decoration: underline; padding:0;
  }
  .auth-msg{ font-size: 12.5px; margin-top: 14px; min-height: 16px; }
  .auth-msg.error{ color: var(--heart); }
  .auth-msg.ok{ color: var(--a-accent); }
</style>
</head>
<body>

<div class="user-corner">
  <button class="user-icon-btn" id="user-icon-btn" aria-label="Профиль">
    <svg viewBox="0 0 24 24"><path d="M12 12c2.5 0 4.5-2 4.5-4.5S14.5 3 12 3 7.5 5 7.5 7.5 9.5 12 12 12z"/><path d="M4 21c0-4.4 3.6-8 8-8s8 3.6 8 8"/></svg>
  </button>
  <div class="user-menu" id="user-menu">
    <p class="u-email" id="user-menu-email"></p>
    <button id="logout-btn">Выйти</button>
  </div>
</div>

<div class="modal-backdrop" id="auth-modal">
  <div class="modal-card">
    <button class="modal-close" id="modal-close-btn" aria-label="Закрыть">×</button>
    <h2 id="auth-title">Вход</h2>
    <p class="sub" id="auth-sub">Войдите, чтобы отмечать книги и сохранять прогресс на всех устройствах.</p>
    <form id="auth-form">
      <div class="auth-field">
        <label for="auth-email">Email</label>
        <input type="email" id="auth-email" required autocomplete="email">
      </div>
      <div class="auth-field">
        <label for="auth-password">Пароль</label>
        <input type="password" id="auth-password" required autocomplete="current-password" minlength="6">
      </div>
      <button type="submit" class="auth-submit" id="auth-submit-btn">Войти</button>
    </form>
    <div class="auth-switch">
      <span id="auth-switch-text">Нет аккаунта?</span>
      <button type="button" id="auth-switch-btn">Зарегистрироваться</button>
    </div>
    <p class="auth-msg" id="auth-msg"></p>
  </div>
</div>

<div class="wrap">

  <header class="site">
    <p class="eyebrow">Список для чтения</p>
    <h1 class="site-title">«Западный <em>канон</em>»</h1>
    <p class="site-author">Гарольд Блум</p>
  </header>

  <div class="toolbar">
    <div style="flex:1; min-width:220px;">
      <div class="stats">
        <div class="stat">
          <span class="num" id="stat-read">0</span>
          <span class="label">прочитано</span>
        </div>
        <div class="stat">
          <span class="num" id="stat-total">0</span>
          <span class="label">всего книг</span>
        </div>
        <div class="stat">
          <span class="num" id="stat-fav">0</span>
          <span class="label">в избранном</span>
        </div>
      </div>
      <div class="progress-track"><div class="progress-fill" id="progress-fill"></div></div>
    </div>
    <div class="filters">
      <button class="filter-btn active" data-filter="all">Все</button>
      <button class="filter-btn" data-filter="read">Прочитано</button>
      <button class="filter-btn" data-filter="fav">Избранное</button>
    </div>
  </div>

  <main id="epochs"></main>
  <p class="empty-note" id="empty-note">Ничего не найдено по этому фильтру.</p>

  <footer class="site">Список составлен по приложению к книге Гарольда Блума «Западный канон»</footer>

Также в этот период крепнут и русская, и американская литературы. Я противился ретроспективному набору в рамках нынешних канонических кампаний, направленных на возвышение некоторого числа прискорбно негодных писательниц XIX столетия, а также ряда немудреных прозаических и поэтических сочинений, написанных афроамериканцами. Расширение Канона, как я не раз говорил в этой книге, имеет тенденцию к вытеснению из него хороших, а иногда и лучших писателей, поскольку никто из нас, кем бы мы ни были, не располагает временем, чтобы читать абсолютно все, — как бы ни была велика наша страсть к чтению. К тому же у большинства из нас, в первую очередь у измученной молодежи, негодные авторы отнимут силы, которые следовало бы потратить на писателей посильнее. Практически все, воскрешенное или открытое литературоведами-феминистами или литературоведами-афроамерикацами, слишком определенно относится к категории «вещей своего времени»; оно столь же устарело в художественном отношении сейчас, сколь немощно было уже в момент своего возникновения."], "countries": [{"name": "ИТАЛИЯ", "books": [], "authors": [{"name": "Уго Фосколо", "books": [{"id": "b2-c0-a0-k0", "title": "Гробницы"}, {"id": "b2-c0-a0-k1", "title": "Последние письма Якопо Ортиса"}, {"id": "b2-c0-a0-k2", "title": "Оды, Грации"}]}, {"name": "Алессандро Мандзони", "books": [{"id": "b2-c0-a1-k0", "title": "Обрученные"}, {"id": "b2-c0-a1-k1", "title": "Об историческом романе"}]}, {"name": "Джакомо Леопарди", "books": [{"id": "b2-c0-a2-k0", "title": "Эссе и диалоги"}, {"id": "b2-c0-a2-k1", "title": "Стихотворения"}, {"id": "b2-c0-a2-k2", "title": "Нравственные очерки"}]}, {"name": "Джузеппе Джоакино Белли", "books": [{"id": "b2-c0-a3-k0", "title": "Римские сонеты"}]}, {"name": "Джозуэ Кардуччи", "books": [{"id": "b2-c0-a4-k0", "title": "Гимн Сатане"}, {"id": "b2-c0-a4-k1", "title": "Варварские оды"}, {"id": "b2-c0-a4-k2", "title": "Рифмы и ритмы"}]}, {"name": "Джованни Верга", "books": [{"id": "b2-c0-a5-k0", "title": "Сельские н iption": ["Относительно этого списка уверенности у меня меньше, чем относительно трех предшествующих. Культурное пророчество — это всегда искушение судьбы. Не все сочинения тут могут оказаться каноническими; литературное перенаселение угрожает многим из них. Но я не включал и не исключал ничего, руководствуясь соображениями какой бы то ни было культурной политики. То, что я опустил, на мой взгляд, обречено остаться «вещами своего времени»: даже их приверженцы-«мультикультуралисты» восстанут против них поколения через два, чтобы расчистить место для литературы получше. Вошедшее сюда несомненно отражает некоторое воздействие моего личного вкуса, но отнюдь не представляет в полной мере моих индивидуальных предпочтений. Роберт Лоуэлл и Филип Ларкин вошли сюда потому, что я, кажется, единственный из ныне живущих литературоведов, который считает их переоцененными, поэтому я, вероятно, неправ и должен допустить, что ослеплен внеэстетическими соображениями; этого я не выношу и пытаюсь избегать. Впрочем, я бы не удивился, если бы через полвека вернулся из мертвых и обнаружил, что написанное Лоуэллом и Ларкиным суть «вещи своего времени», как и многое из того, что я не включил. Но литературоведы не создают канонов, как не могут создавать их и сети ресентимента, — и, может статься, будущие поэты подтвердят канонический статус Лоуэлла и Ларкина, обнаружив, что от их влияния им не уйти."], "countries": [{"name": "ИТАЛИЯ", "books": [], "authors": [{"name": "Луиджи Пиранделло", "books": [{"id": "b3-c0-a0-k0", "title": "Лиола"}, {"id": "b3-c0-a0-k1", "title": "Это так (если вам так кажется)"}, {"id": "b3-c0-a0-k2", "title": "Генрих IV"}, {"id": "b3-c0-a0-k3", "title": "Шесть персонажей в поисках автора"}, {"id": "b3-c0-a0-k4", "title": "Каждый по-своему"}]}, {"name": "Габриэле Д’Аннунцио", "books": [{"id": "b3-c0-a1-k0", "title": "Майя"}]}, {"name": "Дино Кампана", "books": [{"id": "b3-c0-a2-k0", "title": "Орфические песни"}]}, {"name": "Умберто Саба", "books": [{"id": "b3-c0-a3-k0   var SUPABASE_ANON_KEY = 'sb_publishable_2LHjtICT12aQEzlnMWJA3w_qc-85hJB';
  // ============================================================================

  var DATA = JSON.parse(document.getElementById('canon-data').textContent);
  var supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  var state = { read: {}, fav: {} };
  var currentUser = null;
  var saveTimer = null;
  var pendingFilter = null;   // фильтр, который хотели открыть до логина
  var pendingAction = null;   // { type: 'read'|'fav', id, row }

  var ICON_CHECK = '<svg viewBox="0 0 12 12" fill="none"><path d="M2 6.2L4.6 9L10 3" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>';
  var ICON_HEART = '<svg viewBox="0 0 24 24"><path d="M12 20.5s-7.5-4.8-10-9.6C0.3 7.4 2 3.8 5.6 3.2c2-0.3 3.9 0.6 5 2.3 1.1-1.7 3-2.6 5-2.3 3.6 0.6 5.3 4.2 3.6 7.7-2.5 4.8-10 9.6-10 9.6z"/></svg>';

  function el(tag, cls, html){
    var e = document.createElement(tag);
    if (cls) e.className = cls;
    if (html !== undefined) e.innerHTML = html;
    return e;
  }
  function escapeHtml(s){
    var d = document.createElement('div');
    d.textContent = s;
    return d.innerHTML;
  }

  /* ==================== AUTH MODAL ==================== */

  var isSignUpMode = false;
  var modal = document.getElementById('auth-modal');
  var authForm = document.getElementById('auth-form');
  var authMsg = document.getElementById('auth-msg');
  var authTitle = document.getElementById('auth-title');
  var authSub = document.getElementById('auth-sub');
  var authSubmitBtn = document.getElementById('auth-submit-btn');
  var authSwitchText = document.getElementById('auth-switch-text');
  var authSwitchBtn = document.getElementById('auth-switch-btn');
  var modalCloseBtn = document.getElementById('modal-close-btn');

  var userIconBtn = document.getElementById('user-icon-btn');
  var userMenu = document.getElementById('user-menu');
  var userMenuEmail = document.getElementById('user-menu-email');
  var logoutBtn = document.getElementById('logout-btn');

  function openAuthModal(){
    setAuthMsg('');
    modal.classList.add('open');
    document.getElementById('auth-email').focus();
  }
  function closeAuthModal(){
    modal.classList.remove('open');
    pendingFilter = null;
    pendingAction = null;
    authForm.reset();
  }
  modalCloseBtn.addEventListener('click', closeAuthModal);
  modal.addEventListener('click', function(ev){ if (ev.target === modal) closeAuthModal(); });

  function setAuthMsg(text, kind){
    authMsg.textContent = text || '';
    authMsg.className = 'auth-msg' + (kind ? ' ' + kind : '');
  }

  authSwitchBtn.addEventListener('click', function(){
    isSignUpMode = !isSignUpMode;
    if (isSignUpMode) {
      authTitle.textContent = 'Регистрация';
      authSub.textContent = 'Создайте аккаунт — прогресс будет сохраняться под вашим email.';
      authSubmitBtn.textContent = 'Зарегистрироваться';
      authSwitchText.textContent = 'Уже есть аккаунт?';
      authSwitchBtn.textContent = 'Войти';
    } else {
      authTitle.textContent = 'Вход';
      authSub.textContent = 'Войдите, чтобы отмечать книги и сохранять прогресс на всех устройствах.';
      authSubmitBtn.textContent = 'Войти';
      authSwitchText.textContent = 'Нет аккаунта?';
      authSwitchBtn.textContent = 'Зарегистрироваться';
    }
    setAuthMsg('');
  });

  authForm.addEventListener('submit', function(ev){
    ev.preventDefault();
    var email = document.getElementById('auth-email').value.trim();
    var password = document.getElementById('auth-password').value;
    authSubmitBtn.disabled = true;
    setAuthMsg('');

    var task = isSignUpMode
      ? supabase.auth.signUp({ email: email, password: password })
      : supabase.auth.signInWithPassword({ email: email, password: password });

    task.then(function(res){
      authSubmitBtn.disabled = false;
      if (res.error) {
        setAuthMsg(translateError(res.error.message), 'error');
        return;
      }
      if (isSignUpMode && res.data && res.data.user && !res.data.session) {
        setAuthMsg('Проверьте почту — мы отправили письмо для подтверждения.', 'ok');
        return;
      }
      // успешный вход обрабатывается в onAuthStateChange
    }).catch(function(){
      authSubmitBtn.disabled = false;
      setAuthMsg('Ошибка соединения. Попробуйте ещё раз.', 'error');
    });
  });

  function translateError(msg){
    if (/already registered/i.test(msg)) return 'Этот email уже зарегистрирован. Попробуйте войти.';
    if (/invalid login credentials/i.test(msg)) return 'Неверный email или пароль.';
    if (/password.*at least/i.test(msg)) return 'Пароль слишком короткий (минимум 6 символов).';
    if (/email not confirmed/i.test(msg)) return 'Подтвердите email — мы отправили письмо со ссылкой.';
    return msg;
  }

  logoutBtn.addEventListener('click', function(){
    supabase.auth.signOut();
    userMenu.classList.remove('open');
  });

  userIconBtn.addEventListener('click', function(ev){
    ev.stopPropagation();
    if (currentUser) {
      userMenu.classList.toggle('open');
    } else {
      isSignUpMode = false;
      authTitle.textContent = 'Вход';
      authSub.textContent = 'Войдите, чтобы отмечать книги и сохранять прогресс на всех устройствах.';
      authSubmitBtn.textContent = 'Войти';
      authSwitchText.textContent = 'Нет аккаунта?';
      authSwitchBtn.textContent = 'Зарегистрироваться';
      openAuthModal();
    }
  });
  document.addEventListener('click', function(){ userMenu.classList.remove('open'); });
  userMenu.addEventListener('click', function(ev){ ev.stopPropagation(); });

  supabase.auth.onAuthStateChange(function(event, session){
    if (session && session.user) {
      currentUser = session.user;
      userIconBtn.classList.add('is-logged');
      userIconBtn.innerHTML = escapeHtml(currentUser.email.charAt(0).toUpperCase());
      userMenuEmail.textContent = currentUser.email;

      if (modal.classList.contains('open')) closeAfterLoginSuccess();
      loadProgress();
    } else {
      currentUser = null;
      userIconBtn.classList.remove('is-logged');
      userIconBtn.innerHTML = '<svg viewBox="0 0 24 24"><path d="M12 12c2.5 0 4.5-2 4.5-4.5S14.5 3 12 3 7.5 5 7.5 7.5 9.5 12 12 12z"/><path d="M4 21c0-4.4 3.6-8 8-8s8 3.6 8 8"/></svg>';
      state = { read: {}, fav: {} };
      applyStateToDOM();
      if (currentFilter !== 'all') activateFilter('all');
      updateStats();
    }
  });

  function closeAfterLoginSuccess(){
    modal.classList.remove('open');
    authForm.reset();
    setAuthMsg('');
    // выполнить то действие, ради которого попросили войти
    var pf = pendingFilter, pa = pendingAction;
    pendingFilter = null;
    pendingAction = null;
    setTimeout(function(){
      if (pf) activateFilter(pf);
      else if (pa) {
        if (pa.type === 'read') toggleRead(pa.id, pa.row);
        else toggleFav(pa.id, pa.row);
      }
    }, 50);
  }

  /* ==================== PROGRESS SYNC ==================== */

  function loadProgress(){
    supabase
      .from('progress')
      .select('data')
      .eq('user_id', currentUser.id)
      .maybeSingle()
      .then(function(res){
        state = { read: {}, fav: {} };
        if (res.data && res.data.data) {
          (res.data.data.read || []).forEach(function(id){ state.read[id] = true; });
          (res.data.data.fav || []).forEach(function(id){ state.fav[id] = true; });
        }
        applyStateToDOM();
        updateStats();
        applyFilter();
      });
  }

  function saveProgress(){
    if (!currentUser) return;
    clearTimeout(saveTimer);
    saveTimer = setTimeout(function(){
      var payload = { read: Object.keys(state.read), fav: Object.keys(state.fav) };
      supabase.from('progress').upsert({
        user_id: currentUser.id,
        data: payload,
        updated_at: new Date().toISOString()
      }, { onConflict: 'user_id' }).then(function(){});
    }, 400);
  }

  function applyStateToDOM(){
    document.querySelectorAll('.book-row').forEach(function(row){
      var id = row.dataset.id;
      row.classList.toggle('is-read', !!state.read[id]);
      row.classList.toggle('is-fav', !!state.fav[id]);
    });
  }

  /* ==================== BOOK ROWS ==================== */

  function makeBookRow(book){
    var row = el('div', 'book-row');
    row.dataset.id = book.id;

    var check = el('button', 'check', ICON_CHECK);
    check.setAttribute('aria-label', 'Отметить как прочитанное');
    check.addEventListener('click', function(ev){ ev.preventDefault(); requestToggleRead(book.id, row); });

    var title = el('span', 'book-title', escapeHtml(book.title));
    title.addEventListener('click', function(){ requestToggleRead(book.id, row); });

    var heart = el('button', 'heart-btn', ICON_HEART);
    heart.setAttribute('aria-label', 'Добавить в избранное');
    heart.addEventListener('click', function(ev){ ev.preventDefault(); requestToggleFav(book.id, row); });

    row.appendChild(check);
    row.appendChild(title);
    row.appendChild(heart);
    return row;
  }

  function requestToggleRead(id, row){
    if (!currentUser) { pendingAction = { type: 'read', id: id, row: row }; openAuthModal(); return; }
    toggleRead(id, row);
  }
  function requestToggleFav(id, row){
    if (!currentUser) { pendingAction = { type: 'fav', id: id, row: row }; openAuthModal(); return; }
    toggleFav(id, row);
  }

  function toggleRead(id, row){
    if (state.read[id]) { delete state.read[id]; row.classList.remove('is-read'); }
    else { state.read[id] = true; row.classList.add('is-read'); }
    saveProgress();
    updateStats();
    applyFilter();
  }

  function toggleFav(id, row){
    if (state.fav[id]) { delete state.fav[id]; row.classList.remove('is-fav'); }
    else { state.fav[id] = true; row.classList.add('is-fav'); }
    saveProgress();
    updateStats();
    applyFilter();
  }

  var TOTAL_BOOKS = 0;

  function render(){
    var root = document.getElementById('epochs');
    root.innerHTML = '';

    DATA.forEach(function(block, bi){
      TOTAL_BOOKS += countBooksInBlock(block);

      var details = el('details', 'epoch');
      details.dataset.letterBlock = String(bi);
      if (bi === 0) details.open = true;

      var summary = el('summary', 'epoch-head');
      var letterSpan = el('span', 'epoch-letter', block.letter);
      var heading = el('div', 'epoch-heading');
      var titleEl = el('p', 'epoch-title', escapeHtml(block.title));
      var metaEl = el('p', 'epoch-meta', countBooksInBlock(block) + ' книг');
      heading.appendChild(titleEl);
      heading.appendChild(metaEl);
      var chevron = el('span', 'epoch-chevron', CHEVRON_DOWN);

      summary.appendChild(letterSpan);
      summary.appendChild(heading);
      summary.appendChild(chevron);
      details.appendChild(summary);

      var body = el('div', 'epoch-body');
      if (block.description && block.description.length) {
        var desc = el('div', 'epoch-desc');
        block.description.forEach(function(p){ desc.appendChild(el('p', null, escapeHtml(p))); });
        body.appendChild(desc);
      }
      block.countries.forEach(function(country){ body.appendChild(makeCountry(country)); });
      details.appendChild(body);
      root.appendChild(details);
    });

    document.getElementById('stat-total').textContent = TOTAL_BOOKS;
    updateStats();
  }

  function countBooksInBlock(block){
    var n = 0;
    block.countries.forEach(function(c){
      n += c.books.length;
      c.authors.forEach(function(a){ n += a.books.length; });
    });
    return n;
  }
  function countBooksInCountry(country){
    var n = country.books.length;
    country.authors.forEach(function(a){ n += a.books.length; });
    return n;
  }

  function makeCountry(country){
    var details = el('details', 'country');
    var summary = el('summary', 'country-head');
    var left = el('span', 'country-head-left');
    left.appendChild(el('span', 'country-dot'));
    left.appendChild(document.createTextNode(country.name));
    var right = el('span', 'country-head-right', '');
    right.style.display = 'flex';
    right.style.alignItems = 'center';
    right.style.gap = '10px';
    right.appendChild(el('span', 'country-count', countBooksInCountry(country) + ''));
    right.appendChild(el('span', 'country-chevron', CHEVRON_DOWN));
    summary.appendChild(left);
    summary.appendChild(right);
    details.appendChild(summary);

    var body = el('div', 'country-body');
    if (country.books.length){
      var list = el('div', 'book-list');
      country.books.forEach(function(b){ list.appendChild(makeBookRow(b)); });
      body.appendChild(list);
    }
    country.authors.forEach(function(author){ body.appendChild(makeAuthor(author)); });
    details.appendChild(body);
    return details;
  }

  function makeAuthor(author){
    var details = el('details', 'author');
    var summary = el('summary', 'author-head');
    summary.appendChild(el('span', 'author-chevron', CHEVRON_SMALL));
    summary.appendChild(document.createTextNode(author.name));
    summary.appendChild(el('span', 'author-count', '\u00A0· ' + author.books.length));
    details.appendChild(summary);

    var body = el('div', 'author-body');
    var list = el('div', 'book-list');
    author.books.forEach(function(b){ list.appendChild(makeBookRow(b)); });
    body.appendChild(list);
    details.appendChild(body);
    return details;
  }

  function updateStats(){
    document.getElementById('stat-read').textContent = Object.keys(state.read).length;
    document.getElementById('stat-fav').textContent = Object.keys(state.fav).length;
    var pct = TOTAL_BOOKS ? (Object.keys(state.read).length / TOTAL_BOOKS * 100) : 0;
    document.getElementById('progress-fill').style.width = pct + '%';
  }

  var currentFilter = 'all';

  function applyFilter(){
    var epochsRoot = document.getElementById('epochs');
    epochsRoot.classList.toggle('compact', currentFilter !== 'all');

    var rows = document.querySelectorAll('.book-row');
    var anyVisible = false;

    rows.forEach(function(row){
      var id = row.dataset.id;
      var match = true;
      if (currentFilter === 'read') match = !!state.read[id];
      else if (currentFilter === 'fav') match = !!state.fav[id];
      row.classList.toggle('is-hidden', !match);
      if (match) anyVisible = true;
    });

    document.querySelectorAll('.author').forEach(function(a){
      var hasVisible = a.querySelectorAll('.book-row:not(.is-hidden)').length > 0;
      a.style.display = hasVisible ? '' : 'none';
      if (currentFilter !== 'all') a.open = hasVisible;
    });
    document.querySelectorAll('.country').forEach(function(c){
      var hasVisible = c.querySelectorAll('.book-row:not(.is-hidden)').length > 0;
      c.style.display = hasVisible ? '' : 'none';
      if (currentFilter !== 'all') c.open = hasVisible;
    });
    document.querySelectorAll('.epoch').forEach(function(ep){
      var hasVisible = ep.querySelectorAll('.book-row:not(.is-hidden)').length > 0;
      ep.style.display = hasVisible ? '' : 'none';
      if (currentFilter !== 'all') ep.open = hasVisible;
    });

    document.getElementById('empty-note').classList.toggle('show', !anyVisible);
  }

  function activateFilter(filter){
    document.querySelectorAll('.filter-btn').forEach(function(b){
      b.classList.toggle('active', b.dataset.filter === filter);
    });
    currentFilter = filter;
    if (currentFilter === 'all') {
      document.querySelectorAll('.country, .author, .epoch').forEach(function(node){ node.style.display = ''; });
      document.querySelectorAll('.epoch').forEach(function(ep, i){ ep.open = (i === 0); });
      document.querySelectorAll('.country, .author').forEach(function(n){ n.open = false; });
    }
    applyFilter();
  }

  function initFilters(){
    document.querySelectorAll('.filter-btn').forEach(function(btn){
      btn.addEventListener('click', function(){
        var filter = btn.dataset.filter;
        if ((filter === 'read' || filter === 'fav') && !currentUser) {
          pendingFilter = filter;
          openAuthModal();
          return;
        }
        activateFilter(filter);
      });
    });
  }

  render();
  initFilters();
  applyFilter();
})();

</script>
</body>
</html>
